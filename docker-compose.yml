services:
  postgres:
    image: postgres:16-alpine
    container_name: sidekit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sidekit
      POSTGRES_PASSWORD: sidekit
      POSTGRES_DB: sidekit
    ports:
      - "5433:5432"
    volumes:
      - sidekit_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sidekit -d sidekit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sidekit_pg_data:
