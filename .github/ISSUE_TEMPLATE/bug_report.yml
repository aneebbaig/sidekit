name: Bug report
description: Report a problem so it can be fixed
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node version, deployment (local / Vercel / other).
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
    validations:
      required: false
