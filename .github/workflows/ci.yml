name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sidekit
          POSTGRES_PASSWORD: sidekit
          POSTGRES_DB: sidekit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sidekit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://sidekit:sidekit@localhost:5432/sidekit?schema=public
      DIRECT_URL: postgresql://sidekit:sidekit@localhost:5432/sidekit?schema=public
      AUTH_SECRET: ci-only-secret-not-used-in-production
      AUTH_TRUST_HOST: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Push schema
        run: pnpm exec prisma db push --skip-generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
